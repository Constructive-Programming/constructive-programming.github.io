{% comment %}
  Renders a row of Medium post cards from _data/medium.yml.
{% endcomment %}

<div class="medium-posts bootstrap-iso">
  <div class="row justify-content-center">
    {% for post in site.data.medium %}
      <div class="col-md-6 col-lg-3 d-flex">
        <div class="card mt-3 flex-fill">
          <div class="card-body d-flex flex-column">
            <h5 class="card-title mb-1">
              <a href="{{ post.url }}"
                 class="post-link"
                 target="_blank" rel="noopener"
                 aria-label="{{ post.title }}">{{ post.title }}</a>
            </h5>
            {% if post.date %}
              <p class="card-subtitle text-muted mb-2">
                <small>{{ post.date | date: '%b %Y' }}</small>
              </p>
            {% endif %}
            <p class="card-text mt-auto"><small>{{ post.blurb }}</small></p>
          </div>
        </div>
      </div>
    {% endfor %}
  </div>
</div>
