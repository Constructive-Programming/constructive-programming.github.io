# Footer
footer_text: "Copyright Constructive Programming,"

# Legal / compliance footer (rendered if filled). Procurement teams ask
# for these before signing an MSA; volunteering them removes friction.
# Leave empty strings to suppress the legal line entirely.
legal:
  entity: "Constructive Programming"
  kvk: ""   # KvK (Dutch Chamber of Commerce) number, e.g. "12345678"
  vat: ""   # BTW / VAT, e.g. "NL001234567B01"
  insurance: "E&amp;O insurance available on request."

# Analytics: switch to Plausible (or remove) when we have a host;
# UA was sunset July 2023 so we no longer emit a measurement id.
# google_analytics:

# BUILD SETTINGS
katex: true
# auto: follow the visitor's system preference (prefers-color-scheme),
# remember manual toggle via sessionStorage. Renders the theme-toggle
# in the navbar.
color_theme: auto
remote_theme: sylhare/Type-on-Strap
plugins: [jekyll-paginate, jekyll-seo-tag, jekyll-feed, jekyll-remote-theme]
