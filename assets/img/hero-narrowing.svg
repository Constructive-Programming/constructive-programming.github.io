<?xml version="1.0" encoding="UTF-8"?>
<!--
  Constructive Programming — hero "narrowing" graphic.

  Three monospace rows. Each row is a type signature inside a rounded
  bar; the bar shrinks left-to-right while the cardinality label on the
  right counts down from ∞ to 151. The visual story: the type gets
  narrower, the inhabitable space shrinks, bugs get harder to express.

  Uses currentColor + CSS for dark-mode adaptation. The graphic
  inherits the surrounding text colour so it works on both themes
  without recompiling.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 800 240"
     role="img"
     aria-labelledby="hero-narrowing-title"
     preserveAspectRatio="xMidYMid meet"
     style="max-width:100%;height:auto;">
  <title id="hero-narrowing-title">Type signatures being narrowed: from String to Either to a 151-inhabitant refinement.</title>

  <style>
    .bar    { fill: rgba(59, 59, 140, 0.10); stroke: #3b3b8c; stroke-width: 1.25; }
    .bar-2  { fill: rgba(59, 59, 140, 0.16); }
    .bar-3  { fill: rgba(59, 59, 140, 0.24); }
    .code   { fill: #1e1e3a;
              font-family: "JetBrains Mono", "SF Mono", "Cascadia Code",
                           Menlo, Consolas, monospace;
              font-size: 22px;
              font-weight: 500; }
    .key    { fill: #3b3b8c; }
    .card   { fill: #6b6b80;
              font-family: "JetBrains Mono", "SF Mono", "Cascadia Code",
                           Menlo, Consolas, monospace;
              font-size: 15px;
              font-weight: 400; }
    .narrow-arrow { stroke: #3b3b8c; stroke-width: 1.5; fill: none;
                    stroke-linecap: round; stroke-linejoin: round; }

    @media (prefers-color-scheme: dark) {
      .bar    { fill: rgba(138, 138, 240, 0.10); stroke: #8a8af0; }
      .bar-2  { fill: rgba(138, 138, 240, 0.18); }
      .bar-3  { fill: rgba(138, 138, 240, 0.26); }
      .code   { fill: #cdd9e5; }
      .key    { fill: #8a8af0; }
      .card   { fill: #8b8ba0; }
      .narrow-arrow { stroke: #8a8af0; }
    }
  </style>

  <!-- Row 1 — widest, the unconstrained primitive. -->
  <rect class="bar" x="20" y="20" width="560" height="48" rx="6"/>
  <text class="code" x="40" y="52">
    <tspan class="key">String</tspan>
  </text>
  <text class="card" x="600" y="50">inhabitants:</text>
  <text class="card" x="600" y="68" style="font-size: 17px;">∞</text>

  <!-- arrow row 1 → row 2 -->
  <path class="narrow-arrow" d="M 60 76 L 80 96"/>

  <!-- Row 2 — narrower, structured error channel. -->
  <rect class="bar bar-2" x="80" y="96" width="420" height="48" rx="6"/>
  <text class="code" x="100" y="128">
    <tspan class="key">Either</tspan>[<tspan class="key">ParseError</tspan>, <tspan class="key">Int</tspan>]
  </text>
  <text class="card" x="600" y="126">inhabitants:</text>
  <text class="card" x="600" y="144" style="font-size: 17px;">2³² + N</text>

  <!-- arrow row 2 → row 3 -->
  <path class="narrow-arrow" d="M 140 152 L 160 172"/>

  <!-- Row 3 — narrowest, the refined domain type. -->
  <rect class="bar bar-3" x="160" y="172" width="260" height="48" rx="6"/>
  <text class="code" x="180" y="204">
    <tspan class="key">Refined</tspan>[<tspan class="key">Int</tspan>, 0..150]
  </text>
  <text class="card" x="600" y="202">inhabitants:</text>
  <text class="card" x="600" y="220" style="font-size: 17px; font-weight: 600;">151</text>
</svg>
