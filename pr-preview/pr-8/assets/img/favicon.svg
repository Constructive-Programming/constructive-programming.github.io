<?xml version="1.0" encoding="UTF-8"?>
<!-- Constructive Programming — narrowing mark.
     Three horizontal bars; widths in the golden ratio φ ≈ 1.618.
     Top : middle : bottom = 42 : 26 : 16, each step ÷ φ.
     prefers-color-scheme-aware via inline media query. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Constructive Programming">
  <style>
    .bar { fill: #3b3b8c; }
    @media (prefers-color-scheme: dark) {
      .bar { fill: #8a8af0; }
    }
  </style>
  <!-- Top bar — widest (42 = 26 × φ) -->
  <rect class="bar" x="11" y="16" width="42" height="8" rx="2.5"/>
  <!-- Middle bar (26 = 16 × φ) -->
  <rect class="bar" x="19" y="28" width="26" height="8" rx="2.5"/>
  <!-- Bottom bar — narrowest -->
  <rect class="bar" x="24" y="40" width="16" height="8" rx="2.5"/>
</svg>
