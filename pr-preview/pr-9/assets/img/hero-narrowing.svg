<?xml version="1.0" encoding="UTF-8"?>
<!--
  Constructive Programming — hero "narrowing" graphic.

  Three rounded bars; widths in the golden ratio φ ≈ 1.618.
  Top bar (String) is widest; each subsequent bar is ÷ φ narrower.

  Pedagogical arc:
    String                                space for bugs: ∞
    Int                                   bugs can still hide in an Int
    type YourActualDomainValues = ...     not so much when you clearly
                                          delimit your domain values

  Bar widths: 1309 / 809 / 500. Ratios: 1309÷809=1.618, 809÷500=1.618.
  Bar 3 (narrowest) is sized first so the `type ...` text sits fully
  inside its bar with padding.

  CSS inside the SVG handles dark mode via prefers-color-scheme.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1400 360"
     role="img"
     aria-labelledby="hero-narrowing-title"
     preserveAspectRatio="xMidYMid meet"
     style="max-width:100%;height:auto;">
  <title id="hero-narrowing-title">A type signature narrowed three times: String (space for bugs: infinity), Int (bugs can still hide in an Int), and a domain-specific type alias (not so much when you clearly delimit your domain values).</title>

  <style>
    .bar      { fill: rgba(59, 59, 140, 0.10); stroke: #3b3b8c; stroke-width: 1.4; }
    .bar-2    { fill: rgba(59, 59, 140, 0.17); }
    .bar-3    { fill: rgba(59, 59, 140, 0.25); }
    .code     { fill: #1e1e3a;
                font-family: "JetBrains Mono", "SF Mono", "Cascadia Code",
                             Menlo, Consolas, monospace;
                font-size: 22px;
                font-weight: 500; }
    .key      { fill: #3b3b8c; }
    .ellipsis { fill: #6b6b80; }
    .sub      { fill: #5a5a72;
                font-family: -apple-system, BlinkMacSystemFont, "Inter",
                             "Segoe UI", Roboto, "Helvetica Neue", Arial,
                             sans-serif;
                font-size: 17px;
                font-weight: 400; }

    @media (prefers-color-scheme: dark) {
      .bar      { fill: rgba(138, 138, 240, 0.10); stroke: #8a8af0; }
      .bar-2    { fill: rgba(138, 138, 240, 0.18); }
      .bar-3    { fill: rgba(138, 138, 240, 0.28); }
      .code     { fill: #cdd9e5; }
      .key      { fill: #8a8af0; }
      .ellipsis { fill: #8b8ba0; }
      .sub      { fill: #a4a4b8; }
    }
  </style>

  <!-- Bar 1 — widest (1309). The unconstrained primitive. -->
  <rect class="bar" x="50" y="20" width="1309" height="56" rx="8"/>
  <text class="code" x="80" y="58">
    <tspan class="key">String</tspan>
  </text>
  <text class="sub" x="50" y="104">space for bugs: ∞</text>

  <!-- Bar 2 — middle (809 = 1309 ÷ φ). Typed but still wide. -->
  <rect class="bar bar-2" x="150" y="132" width="809" height="56" rx="8"/>
  <text class="code" x="180" y="170">
    <tspan class="key">Int</tspan>
  </text>
  <text class="sub" x="150" y="216">bugs can still hide in an Int</text>

  <!-- Bar 3 — narrowest (500 = 809 ÷ φ). The refined domain type. -->
  <rect class="bar bar-3" x="250" y="244" width="500" height="56" rx="8"/>
  <text class="code" x="280" y="282">
    <tspan class="key">type</tspan> YourActualDomainValues <tspan class="ellipsis">= ...</tspan>
  </text>
  <text class="sub" x="250" y="328">not so much when you clearly delimit your domain values</text>
</svg>
